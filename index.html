<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Fotos con Marco</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            font-weight: 600;
            font-size: 2rem;
            margin-bottom: 8px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #94a3b8;
            margin-bottom: 32px;
        }

        .upload-zone {
            border: 2px dashed rgba(99, 102, 241, 0.3);
            border-radius: 16px;
            padding: 40px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            background: rgba(15, 23, 42, 0.3);
            margin-bottom: 24px;
        }

        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
            transform: translateY(-2px);
        }

        .upload-zone svg {
            width: 48px;
            height: 48px;
            color: var(--primary);
            margin-bottom: 16px;
        }

        .preview-container {
            display: none;
            margin-top: 24px;
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        canvas {
            display: none; /* Procesamos en canvas pero mostramos en img */
        }

        #result-image {
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: 12px;
            cursor: zoom-in;
        }

        .hint {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 12px;
            display: none;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 28px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            font-size: 1rem;
            width: 100%;
            margin-top: 16px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #a855f7);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
            filter: brightness(1.1);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        #file-input {
            display: none;
        }

        .loader {
            display: none;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Tu Foto, Tu Estilo</h1>
    <p>Sube tu imagen para aplicarle el marco personalizado automáticamente.</p>

    <div class="upload-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
        <div id="upload-text">Haz clic o arrastra una imagen aquí</div>
        <div class="loader" id="loader"></div>
        <input type="file" id="file-input" accept="image/*">
    </div>

    <div class="preview-container" id="preview-container">
        <canvas id="photo-canvas"></canvas>
        <img id="result-image" alt="Resultado" />
        <p class="hint" id="save-hint">Tip: Si el botón falla, haz clic derecho aquí y elige "Guardar imagen como..."</p>
    </div>

    <button id="download-btn" class="btn btn-primary" style="display: none;">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
        </svg>
        Descargar Imagen
    </button>
</div>

    const FRAME_URL = FRAME_B64; 
    
    const fileInput = document.getElementById('file-input');
    const dropZone = document.getElementById('drop-zone');
    const canvas = document.getElementById('photo-canvas');
    const ctx = canvas.getContext('2d');
    const previewContainer = document.getElementById('preview-container');
    const downloadBtn = document.getElementById('download-btn');
    const uploadText = document.getElementById('upload-text');
    const resultImage = document.getElementById('result-image');
    const saveHint = document.getElementById('save-hint');
    const loader = document.getElementById('loader');

    // Manejo de drag and drop
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) {
            processImage(file);
        }
    });

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) processImage(file);
    });

    async function processImage(file) {
        console.log("Procesando imagen:", file.name);
        uploadText.style.display = 'none';
        loader.style.display = 'block';
        console.log(file)
        console.log(URL.createObjectURL(file))
        try {
            // Usar FileReader para evitar problemas de origen blob:null en file://
            const reader = new FileReader();
            reader.onload = async (e) => {
                const b64Photo = e.target.result;
                const userImg = await loadImage(b64Photo);
                console.log("Imagen de usuario cargada (Base64)");
                
                const frameImg = await loadImage(FRAME_URL).catch(err => {
                    console.warn("No se pudo cargar el marco:", err);
                    return null;
                });

                if (frameImg) {
                    console.log("Marco cargado con éxito.");
                }

                const size = frameImg ? frameImg.width : userImg.width;
                canvas.width = size;
                canvas.height = size;

                ctx.clearRect(0, 0, size, size);

                const scale = Math.max(size / userImg.width, size / userImg.height);
                const x = (size / 2) - (userImg.width / 2) * scale;
                const y = (size / 2) - (userImg.height / 2) * scale;
                ctx.drawImage(userImg, x, y, userImg.width * scale, userImg.height * scale);
                
                if (frameImg) {
                    ctx.drawImage(frameImg, 0, 0, size, size);
                } else {
                    alert("Atención: No se pudo cargar el marco.");
                }

                const finalDataUrl = canvas.toDataURL('image/png');
                resultImage.src = finalDataUrl;

                previewContainer.style.display = 'block';
                downloadBtn.style.display = 'inline-flex';
                saveHint.style.display = 'block';
                uploadText.innerText = 'Cambiar imagen';
                loader.style.display = 'none';
                uploadText.style.display = 'block';
            };
            reader.onerror = (err) => {
                console.error("Error al leer el archivo:", err);
                loader.style.display = 'none';
                uploadText.style.display = 'block';
            };
            reader.readAsDataURL(file);

        } catch (error) {
            console.error("Error en el procesamiento:", error);
            loader.style.display = 'none';
            uploadText.style.display = 'block';
        }
    }

    function loadImage(url) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            
            // Si es Base64, no necesitamos configurar crossOrigin
            if (!url.startsWith('data:')) {
                img.crossOrigin = 'anonymous';
            }
            
            img.onload = () => {
                resolve(img);
            };
            
            img.onerror = () => {
                reject(new Error("No se pudo cargar la imagen: " + url.substring(0, 50)));
            };
            
            img.src = url;
        });
    }

    downloadBtn.addEventListener('click', () => {
        try {
            console.log("Iniciando descarga...");
            const dataUrl = canvas.toDataURL('image/png');
            
            const link = document.createElement('a');
            link.download = 'foto-con-marco.png';
            link.href = dataUrl;
            
            // Forzar descarga en Edge/Chrome
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            console.log("Descarga solicitada via link.");
        } catch (error) {
            console.error("Error al descargar:", error);
            alert("Error al generar la descarga. Por favor, usa el clic derecho sobre la imagen para guardarla.");
        }
    });
</script>

</html>
