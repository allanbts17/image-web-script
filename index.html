<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Fotos con Marco</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            font-weight: 600;
            font-size: 2rem;
            margin-bottom: 8px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #94a3b8;
            margin-bottom: 32px;
        }

        .upload-zone {
            border: 2px dashed rgba(99, 102, 241, 0.3);
            border-radius: 16px;
            padding: 40px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            background: rgba(15, 23, 42, 0.3);
            margin-bottom: 24px;
        }

        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
            transform: translateY(-2px);
        }

        .upload-zone svg {
            width: 48px;
            height: 48px;
            color: var(--primary);
            margin-bottom: 16px;
        }

        .preview-container {
            display: none;
            margin-top: 24px;
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        #photo-canvas {
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: 12px;
            cursor: grab;
            margin: 0 auto;
            background-color: #000;
        }

        #photo-canvas:active {
            cursor: grabbing;
        }

        #result-image {
            display: none; /* Ahora usamos el canvas */
        }

        .zoom-controls {
            display: none;
            flex-direction: column;
            gap: 8px;
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.05);
            padding: 16px;
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .zoom-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            background: rgba(99, 102, 241, 0.2);
            border-radius: 5px;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: var(--primary);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
        }

        .hint {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 12px;
            display: none;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 28px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            font-size: 1rem;
            width: 100%;
            margin-top: 16px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #a855f7);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
            filter: brightness(1.1);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        #file-input {
            display: none;
        }

        .loader {
            display: none;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Tu Foto, Tu Estilo</h1>
    <p>Sube tu imagen para aplicarle el marco personalizado automáticamente.</p>

    <div class="upload-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
        <div id="upload-text">Haz clic o arrastra una imagen aquí</div>
        <div class="loader" id="loader"></div>
        <input type="file" id="file-input" accept="image/*">
    </div>

    <div class="zoom-controls" id="zoom-controls">
        <div class="zoom-label">
            <span>Zoom</span>
            <span id="zoom-value">100%</span>
        </div>
        <input type="range" id="zoom-slider" min="1" max="3" step="0.01" value="1">
    </div>

    <div class="preview-container" id="preview-container">
        <canvas id="photo-canvas"></canvas>
        <img id="result-image" alt="Resultado" />
        <p class="hint" id="save-hint">Tip: Puedes arrastrar la foto para acomodarla y usar el slider para el zoom.</p>
    </div>

    <button id="download-btn" class="btn btn-primary" style="display: none;">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
        </svg>
        Descargar Imagen
    </button>
</div>

<script>

66uTmG0UmqF0rVqlVi0DldiGvAulSnm77/gnQ5gmLBKbAU9S+zChd46KnW9EnWj5U5XehxP99nxU5lU//rj8+m8+24g/07gSFFgeBM3P14/3ML+1wsU6nRzc72a1CpGvyYbaBLQvBKz1s9Dvqz38rvUNKrx+AkwsIBWHK//K4U6zZRWd1rdaKESCxLr7wEDoh0JNKlZVFf8DV8DYCgBTf/iZKzPt1vtBy4SuNNs8G5Wk1olpl9XepQu1a9KTAMBFbz+JlH911g8fgIMACMycR/esCUn40xV1eXLly9e7GdO1zGnx5RKqz4wxisx4yViQzhW1y2JF2VtDW1tOFIU6Dv0eP3MlLPBGWd+vnSpSkVqXDJ9rnZunZunZuY69vOnXp9fXV29Hte7fsZ691v6+X6+t7993X1dd1/X3f/fP9Xm+k387+P+v831v+vP6+7/7p9+t5869U+v/3f5f/vpf9XfD/O6X9ffVz+f7j/6n681ffn/1XU1v68/3b67773vP+597/3v/efo6Oje/X+e97+KioqKigoX1xcVFRUuF9fXFxUVFXL9X9HwKjEx6T0AAAAASUVORK5CYII=';
    const FRAME_URL = 'https://i.postimg.cc/sftZPzn0/frame1.png'; 
    
    const fileInput = document.getElementById('file-input');
    const dropZone = document.getElementById('drop-zone');
    const canvas = document.getElementById('photo-canvas');
    const ctx = canvas.getContext('2d');
    const previewContainer = document.getElementById('preview-container');
    const downloadBtn = document.getElementById('download-btn');
    const uploadText = document.getElementById('upload-text');
    const resultImage = document.getElementById('result-image');
    const saveHint = document.getElementById('save-hint');
    const loader = document.getElementById('loader');

    const zoomControls = document.getElementById('zoom-controls');
    const zoomSlider = document.getElementById('zoom-slider');
    const zoomValueText = document.getElementById('zoom-value');

    let userImg = null;
    let frameImg = null;
    
    // Estado de transformación
    let scale = 1;
    let minScale = 1;
    let offsetX = 0;
    let offsetY = 0;
    
    // Estado de arrastre
    let isDragging = false;
    let startX, startY;

    // Manejo de drag and drop
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) {
            processImage(file);
        }
    });

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) processImage(file);
    });

    async function processImage(file) {
        uploadText.style.display = 'none';
        loader.style.display = 'block';
        
        try {
            const reader = new FileReader();
            reader.onload = async (e) => {
                const b64Photo = e.target.result;
                userImg = await loadImage(b64Photo);
                
                frameImg = await loadImage(FRAME_URL).catch(err => {
                    console.warn("No se pudo cargar el marco:", err);
                    return null;
                });

                const size = frameImg ? frameImg.width : userImg.width;
                canvas.width = size;
                canvas.height = size;

                // Calcular escala mínima (cubrir todo el canvas)
                minScale = Math.max(size / userImg.width, size / userImg.height);
                scale = minScale;
                
                // Centrar inicialmente
                offsetX = (size - userImg.width * scale) / 2;
                offsetY = (size - userImg.height * scale) / 2;

                // Configurar slider
                zoomSlider.min = minScale;
                zoomSlider.max = minScale * 4;
                zoomSlider.value = scale;
                updateZoomText();

                draw();

                previewContainer.style.display = 'block';
                zoomControls.style.display = 'flex';
                downloadBtn.style.display = 'inline-flex';
                saveHint.style.display = 'block';
                uploadText.innerText = 'Cambiar imagen';
                loader.style.display = 'none';
                uploadText.style.display = 'block';
            };
            reader.readAsDataURL(file);

        } catch (error) {
            console.error("Error en el procesamiento:", error);
            loader.style.display = 'none';
            uploadText.style.display = 'block';
        }
    }

    function draw() {
        if (!userImg) return;

        const size = canvas.width;
        ctx.clearRect(0, 0, size, size);

        // Aplicar restricciones antes de dibujar
        const currentW = userImg.width * scale;
        const currentH = userImg.height * scale;

        // Evitar que la imagen deje bordes vacíos
        if (offsetX > 0) offsetX = 0;
        if (offsetY > 0) offsetY = 0;
        if (offsetX < size - currentW) offsetX = size - currentW;
        if (offsetY < size - currentH) offsetY = size - currentH;

        // Dibujar usuario
        ctx.drawImage(userImg, offsetX, offsetY, currentW, currentH);
        
        // Dibujar marco
        if (frameImg) {
            ctx.drawImage(frameImg, 0, 0, size, size);
        }
    }

    function updateZoomText() {
        const percentage = Math.round((scale / minScale) * 100);
        zoomValueText.innerText = percentage + '%';
    }

    // Interacción con Slider
    zoomSlider.addEventListener('input', (e) => {
        const oldScale = scale;
        scale = parseFloat(e.target.value);
        
        // Ajustar offset para que el zoom sea hacia el centro
        const size = canvas.width;
        const centerX = size / 2;
        const centerY = size / 2;
        
        offsetX = centerX - (centerX - offsetX) * (scale / oldScale);
        offsetY = centerY - (centerY - offsetY) * (scale / oldScale);

        updateZoomText();
        draw();
    });

    // Eventos de Arrastre
    function startDrag(e) {
        isDragging = true;
        const pos = getEventPos(e);
        startX = pos.x - offsetX;
        startY = pos.y - offsetY;
    }

    function moveDrag(e) {
        if (!isDragging) return;
        e.preventDefault();
        const pos = getEventPos(e);
        offsetX = pos.x - startX;
        offsetY = pos.y - startY;
        draw();
    }

    function stopDrag() {
        isDragging = false;
    }

    function getEventPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        // Convertir coordenadas de pantalla a coordenadas de canvas
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        
        return {
            x: (clientX - rect.left) * scaleX,
            y: (clientY - rect.top) * scaleY
        };
    }

    canvas.addEventListener('mousedown', startDrag);
    window.addEventListener('mousemove', moveDrag);
    window.addEventListener('mouseup', stopDrag);

    canvas.addEventListener('touchstart', startDrag, { passive: false });
    window.addEventListener('touchmove', moveDrag, { passive: false });
    window.addEventListener('touchend', stopDrag);

    function loadImage(url) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            if (!url.startsWith('data:')) {
                img.crossOrigin = 'anonymous';
            }
            img.onload = () => resolve(img);
            img.onerror = () => reject(new Error("No se pudo cargar la imagen"));
            img.src = url;
        });
    }

    downloadBtn.addEventListener('click', () => {
        try {
            const dataUrl = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = 'foto-con-marco.png';
            link.href = dataUrl;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        } catch (error) {
            console.error("Error al descargar:", error);
            alert("Error al generar la descarga. Usa clic derecho en la imagen.");
        }
    });
</script>

</body>
</html>
